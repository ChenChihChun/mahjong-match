name: Mahjong Match Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle | tr -d ' ' | sed 's/versionCode//')
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Verify keystore SHA-1
        run: |
          SHA1=$(keytool -list -v -keystore app/debug.keystore \
            -alias androiddebugkey -storepass android 2>/dev/null \
            | grep -E "SHA1:" | head -1 | sed 's/.*: //')
          echo "Keystore SHA-1: $SHA1"
          echo "### Signing Info" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| SHA-1 | \`${SHA1}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | com.mahjong.match |" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mahjong-match-v${{ steps.version.outputs.name }}-build${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}-c${{ steps.version.outputs.code }}
          name: 麻將消消樂 v${{ steps.version.outputs.name }}
          body: |
            Version v${{ steps.version.outputs.name }} (code ${{ steps.version.outputs.code }})
            Build #${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
